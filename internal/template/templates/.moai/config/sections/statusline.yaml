statusline:
  # Display mode: default (3-line), full (5-line)
  mode: "default"

  # Preset name: full, compact, minimal, custom
  preset: "full"

  # Theme name: default, catppuccin-mocha, catppuccin-latte
  theme: "default"

  # Statusline refresh interval in seconds (Claude Code 2.1.97+, REQ-CC297-002)
  # 0 means no periodic refresh (only refresh on events)
  refresh_interval: 10

  # Individual segment toggles (only used when preset is "custom")
  segments:
    model: true
    context: true
    output_style: true
    directory: true
    git_status: true
    claude_version: true
    moai_version: true
    git_branch: true
    worktree: true
    # PR segment (Claude Code v2.1.145+, REQ-SLV-012).
    # Default false — opt-in to surface the active PR number + review_state
    # on L3 of the statusline. Requires Claude Code v2.1.145+ stdin schema.
    pr: false
