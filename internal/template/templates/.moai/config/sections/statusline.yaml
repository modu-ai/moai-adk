statusline:
  # Display mode: default (3-line), full (5-line)
  mode: "default"

  # Preset name: full, compact, minimal, custom
  preset: "full"

  # Theme name: default, catppuccin-mocha, catppuccin-latte
  theme: "default"

  # Statusline refresh interval in seconds (Claude Code 2.1.97+, REQ-CC297-002)
  # 0 means no periodic refresh (only refresh on events)
  refresh_interval: 10

  # Individual segment toggles (only used when preset is "custom")
  # All 15 segments default-on; graceful no-output handles inactive states.
  segments:
    # Line 1: model + version + session metadata
    model: true
    context: true
    output_style: true
    claude_version: true
    moai_version: true
    session_time: true
    effort_thinking: true
    # Line 2: context window + API usage bars
    usage_5h: true
    usage_7d: true
    # Line 3: directory + git + workflow + PR
    directory: true
    git_status: true
    git_branch: true
    worktree: true
    # Task segment (REQ-V3 Cycle 5 Phase 4) — active SPEC workflow info.
    # Renders as "📋 [<command> <SPEC-ID>-<stage>]" only when
    # ~/.moai/state/last-session-state.json `active_task` is set.
    task: true
    # PR segment (Claude Code v2.1.145+, REQ-SLV-012 default-on as of v2.20.0-rc1).
    # Renders as "#<number> ⌥<review_state>" only when stdin JSON includes pr.* object.
    pr: true
