# Security Hardening Configuration
# Extra patterns extend (never replace) DefaultSecurityPolicy hardcoded patterns.
# Uses SOLID O-Principle: extend via config without modifying core.

security:
  # Additional dangerous Bash command patterns (regex, case-insensitive).
  # These are APPENDED to the built-in deny patterns.
  extra_dangerous_bash_patterns:
    - 'curl\s+.*\|\s*(ba)?sh'      # curl pipe to shell
    - 'wget\s+.*\|\s*(ba)?sh'      # wget pipe to shell
    - 'chmod\s+777'                  # world-writable permissions
    - 'rm\s+-rf\s+/[^.]'            # rm -rf targeting root paths
    - 'mkfs\.'                       # filesystem format commands
    - 'dd\s+if=.*of=/dev/'          # raw disk write

  # Additional file deny patterns (regex, case-insensitive).
  extra_deny_patterns: []

  # Additional file ask patterns (regex, case-insensitive).
  extra_ask_patterns: []

  # Additional sensitive content patterns (regex, case-insensitive).
  extra_sensitive_content_patterns: []

  # Permission subsystem keys.
  permission:
    # When strict_mode=true, agent spawn in bypassPermissions mode is rejected.
    strict_mode: false
    # SrcBuiltin pre-allowlist patterns (defaults — actual patterns defined in stack.go PreAllowlist()).
    pre_allowlist: []
    # session_rules: session-scoped rules loaded at the SrcSession tier.
    session_rules: []

  # Sandbox Execution Layer configuration.
  sandbox:
    # When required=true, agents with sandbox: none are rejected without sandbox.justification.
    # Default: false (v3.0 — considered for true in v3.1+).
    required: false
    # network_allowlist: additive list of allowed network hosts added to the default 8.
    # Defaults: github.com, registry.npmjs.org, pypi.org, proxy.golang.org,
    #           crates.io, repo.maven.apache.org, rubygems.org, pub.dev
    network_allowlist: []
    # env_scrub_extra: additive (not replacement) env var names added to the default scrub list.
    # Defaults: AWS_* (prefix), GITHUB_TOKEN, ANTHROPIC_API_KEY, OPENAI_API_KEY,
    #           NPM_TOKEN, GH_TOKEN
    env_scrub_extra: []
    # docker_image: default image to use with the docker backend.
    # Temporary value before EXT-004 migration framework is complete: alpine:latest.
    docker_image: "alpine:latest"
