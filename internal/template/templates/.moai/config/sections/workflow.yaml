workflow:
    # SPEC-V3R2-WF-003 REQ-WF003-014: Optional default mode for /moai run and /moai design.
    # Values: autopilot | loop | team. Empty/absent = harness-based auto-selection.
    # Precedence: CLI --mode flag > this field > harness auto.
    # @MX:WARN - Default mode field is utility-skill-only consumer. REQ-WF003-018 lock-in. @MX:REASON - Field is read by run skill dispatcher; changing semantics without updating dispatcher breaks behavior contract.
    default_mode: ""
    auto_clear:
        after_plan: true
        after_run: false
        enabled: true
        token_threshold: 150000
    execution_mode: team
    loop_prevention:
        failure_pattern_detection: true
        max_iterations: 100
        max_retries_per_operation: 3
    team:
        auto_selection:
            min_complexity_score: 7
            min_domains_for_team: 3
            min_files_for_team: 10
        default_model: sonnet
        delegate_mode: true
        enabled: true
        max_teammates: 10
        # role_profile_keys: enumeration of allowed role types for the 5+1+1
        # Agent Teams composition documented in
        # .claude/rules/moai/workflow/agent-teams-pattern.md (SPEC-V3R5-WORKFLOW-OPT-001
        # Layer B). The full role_profiles map below contains all 7 profile
        # definitions; this list restricts which keys participate in the
        # 5+1+1 spawn pattern (implementer × 5 + tester × 1 + reviewer × 1).
        # Requires: CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1 in settings.json env.
        role_profile_keys:
            - implementer
            - tester
            - reviewer
        role_profiles:
            researcher:
                mode: plan
                model: haiku
                isolation: none
                description: "Read-only codebase exploration and analysis"
            analyst:
                mode: plan
                model: sonnet
                isolation: none
                description: "Requirements analysis and validation"
            architect:
                mode: plan
                model: sonnet
                isolation: none
                description: "Solution design and architecture decisions"
            implementer:
                mode: acceptEdits
                model: sonnet
                isolation: worktree
                description: "Code implementation (backend, frontend, full-stack)"
            tester:
                mode: acceptEdits
                model: sonnet
                isolation: worktree
                description: "Test creation and coverage validation"
            designer:
                mode: acceptEdits
                model: sonnet
                isolation: worktree
                description: "UI/UX design with MCP design tools"
            reviewer:
                mode: plan
                model: haiku
                isolation: none
                description: "Code review and quality validation"
        patterns:
            design_implementation:
                description: Cross-layer feature implementation with UI/UX design
                model: inherit
                roles:
                    - designer
                    - backend-dev
                    - frontend-dev
                    - tester
            full_stack:
                description: Full-stack implementation with quality gate
                model: inherit
                roles:
                    - api-layer
                    - ui-layer
                    - data-layer
                    - quality
            implementation:
                description: Cross-layer feature implementation
                model: inherit
                roles:
                    - backend-dev
                    - frontend-dev
                    - tester
            investigation:
                description: Competing hypothesis debugging
                model: haiku
                roles:
                    - hypothesis-1
                    - hypothesis-2
                    - hypothesis-3
            plan_research:
                description: Parallel SPEC research and design
                model: inherit
                roles:
                    - researcher
                    - analyst
                    - architect
            review:
                description: Multi-perspective code review
                model: inherit
                roles:
                    - security-reviewer
                    - perf-reviewer
                    - quality-reviewer
                    - ux-reviewer
        require_plan_approval: true
    # Worktree automation settings (per the canonical worktree contract)
    # auto_create: false (aligned with worktree-autonomous user policy).
    # L1 worktree is Claude Code runtime autonomous — MoAI orchestrator does not auto-create it.
    # auto_merge/auto_cleanup only take effect when the user manually creates a worktree.
    worktree:
        auto_create: false
        auto_merge: true
        auto_cleanup: true
        tmux_preferred: true
        session_name_pattern: "moai-{ProjectName}-{SPEC-ID}"
        # Sparse checkout paths for large monorepos (Claude Code v2.1.76+)
        # Uncomment and customize to speed up worktree creation
        # sparse_paths:
        #     - "src/"
        #     - "tests/"
        #     - "config/"
    token_budget:
        plan: 30000
        run: 180000
        sync: 40000
