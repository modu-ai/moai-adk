# Token Circuit Breaker configuration
# Per-agent token budget tracking + stall detection.
# Warning-first policy; a hard-fail transition is planned for a future phase.
# /clear is never triggered automatically (HARD constraint).
runtime:
  context_window:
    # Emit warning + persist progress.md when cumulative usage reaches this ratio
    pre_clear_threshold: 0.75
    # Emit strong clear recommendation when cumulative usage reaches this ratio
    hard_clear_threshold: 0.90

  # Per-agent token budget (input + output total, heuristic estimate)
  # Agents not listed here use the 'default' value.
  per_agent_budget:
    default: 30000
    manager-spec: 40000
    sync-auditor: 20000
    plan-auditor: 20000

  circuit_breaker:
    # Seconds without a RecordCall before DetectStall returns true
    stall_detection_seconds: 60
    # After this many stall events, emit fallback recommendation
    retry_max: 3
    # Recommended action when retry_max is reached
    fallback: split_into_waves

  progress_persistence:
    # Automatically save progress.md when pre_clear_threshold is reached
    auto_save_at_threshold: true
    # Template for the progress.md path; {SPEC_ID} is replaced at runtime
    save_path_template: ".moai/specs/{SPEC_ID}/progress.md"
    # Resume message format (paste-ready for the user after /clear)
    resume_message_format: "ultrathink. {wave_label} 이어서 진행. SPEC-{spec_id}부터 {approach_summary}. progress.md 경로: {progress_path}. 다음 단계: {next_step}."
