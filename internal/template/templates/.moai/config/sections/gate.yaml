gate:
  # enabled controls whether the quality gate runs before git commit.
  # The gate auto-detects project language (Go, Node.js, Python, Rust)
  # and runs the appropriate toolchain. Set to false to skip all checks.
  enabled: true

  # skip_tests skips the test step when true.
  # Useful during rapid development cycles when you want quick commits.
  skip_tests: false

  timeouts:
    # vet is the maximum seconds allowed for the lint/vet step
    vet: 30
    # lint is the maximum seconds allowed for the linter step
    lint: 60
    # test is the maximum seconds allowed for the test step
    test: 120
