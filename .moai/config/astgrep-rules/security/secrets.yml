# OWASP 민감정보 하드코딩 규칙
# CWE-798: 하드코딩된 자격증명, CWE-321: JWT 서명키 하드코딩
---
id: sec-hardcoded-api-key
language: go
severity: error
message: "API 키가 소스 코드에 하드코딩되어 있습니다. 환경변수나 시크릿 관리 서비스를 사용하세요."
note: "하드코딩된 비밀 값은 소스 코드 저장소를 통해 유출됩니다. os.Getenv() 또는 Vault 등을 사용하세요."
metadata:
  owasp: "A07:2021 - Identification and Authentication Failures"
  cwe: "CWE-798"
pattern: 'const $NAME = "sk-$$$REST"'
---
id: sec-hardcoded-jwt-signing-key
language: go
severity: error
message: "JWT 서명 키가 리터럴 바이트 슬라이스로 하드코딩되어 있습니다. 환경변수에서 로드하세요."
note: "JWT 서명 키가 코드에 있으면 토큰 위조가 가능합니다. 최소 256비트 이상의 랜덤 키를 환경변수에서 로드하세요."
metadata:
  owasp: "A07:2021 - Identification and Authentication Failures"
  cwe: "CWE-321"
pattern: 'SignedString([]byte("$HARDCODED"))'
