# OWASP 웹 보안 규칙
# CWE-79: XSS, CWE-352: CSRF, CWE-117: 로그 인젝션, CWE-1336: 템플릿 인젝션
---
id: sec-template-injection-html
language: go
severity: error
message: "html/template.HTML()로 사용자 입력을 신뢰된 HTML로 마킹하면 XSS가 발생합니다."
note: "template.HTML() 변환은 이스케이핑을 우회합니다. 사용자 입력에는 절대 사용하지 마세요. 불가피한 경우 bluemonday 등의 sanitizer를 사용하세요."
metadata:
  owasp: "A03:2021 - Injection"
  cwe: "CWE-79"
pattern: template.HTML($USER_INPUT)
---
id: sec-log-injection-unsanitized
language: go
severity: warning
message: "외부 입력값을 로그에 직접 출력합니다. 로그 인젝션을 통해 로그가 오염될 수 있습니다."
note: "사용자 입력을 로그에 출력할 때는 fmt.Sprintf(%q) 또는 strconv.Quote()로 이스케이핑하세요. 개행문자가 있으면 로그 파싱이 깨집니다."
metadata:
  owasp: "A09:2021 - Security Logging and Monitoring Failures"
  cwe: "CWE-117"
pattern: log.Printf($FORMAT, $$$ARGS)
---
id: sec-csrf-no-token-check
language: go
severity: warning
message: "POST 핸들러에 CSRF 토큰 검증이 없습니다. CSRF 공격에 취약할 수 있습니다."
note: "상태를 변경하는 모든 POST/PUT/DELETE 엔드포인트에 gorilla/csrf 또는 동등한 미들웨어를 적용하세요."
metadata:
  owasp: "A01:2021 - Broken Access Control"
  cwe: "CWE-352"
pattern: |
  func $HANDLER(w http.ResponseWriter, r *http.Request) {
    $$$BODY
  }
