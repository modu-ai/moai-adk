# OWASP 인젝션 취약점 규칙
# CWE-89: SQL Injection, CWE-78: Command Injection, CWE-22: Path Traversal
---
id: sec-sql-injection-fmt-sprintf
language: go
severity: error
message: "fmt.Sprintf()로 SQL 쿼리를 생성하면 SQL 인젝션 취약점이 발생합니다."
note: "사용자 입력을 SQL 쿼리에 직접 삽입하지 마세요. 파라미터화된 쿼리(?, $1 등)를 사용하고 드라이버의 인수 전달 기능을 활용하세요."
metadata:
  owasp: "A03:2021 - Injection"
  cwe: "CWE-89"
pattern: |
  fmt.Sprintf("$$$SQL_PARTS %s $$$MORE", $USER_INPUT)
---
id: sec-command-injection-exec-command
language: go
severity: error
message: "exec.Command에 사용자 입력이 직접 전달될 수 있습니다. 명령어 인젝션 위험이 있습니다."
note: "사용자 입력을 exec.Command 인수로 전달할 때는 반드시 화이트리스트 검증을 수행하세요. shell 확장을 피하고 인수를 개별적으로 전달하세요."
metadata:
  owasp: "A03:2021 - Injection"
  cwe: "CWE-78"
pattern: exec.Command("sh", "-c", $CMD)
---
id: sec-path-traversal-join-user-input
language: go
severity: error
message: "filepath.Join에 사용자 입력이 직접 사용됩니다. 경로 순회 공격이 가능합니다."
note: "filepath.Clean()과 filepath.Abs()를 사용하고, 결과 경로가 허용된 베이스 디렉토리 내에 있는지 strings.HasPrefix로 검증하세요."
metadata:
  owasp: "A03:2021 - Injection"
  cwe: "CWE-22"
pattern: filepath.Join($BASE, $USER_INPUT)
