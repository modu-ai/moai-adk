# OWASP 암호화 취약점 규칙
# CWE-327: 취약한 해시 알고리즘, CWE-295: TLS 인증서 검증 우회
---
id: sec-weak-hash-md5
language: go
severity: error
message: "MD5는 보안 용도로 사용하기에 취약한 해시 알고리즘입니다. crypto/sha256 이상을 사용하세요."
note: "MD5는 충돌 공격에 취약합니다. 암호화 용도에는 SHA-256, SHA-512 또는 bcrypt(패스워드)를 사용하세요."
metadata:
  owasp: "A02:2021 - Cryptographic Failures"
  cwe: "CWE-327"
pattern: md5.New()
---
id: sec-tls-insecure-skip-verify
language: go
severity: error
message: "InsecureSkipVerify: true는 TLS 인증서 검증을 비활성화합니다. 중간자 공격에 취약합니다."
note: "프로덕션 코드에서 InsecureSkipVerify를 절대 사용하지 마세요. 자체 서명 인증서가 필요하다면 custom RootCAs를 설정하세요."
metadata:
  owasp: "A02:2021 - Cryptographic Failures"
  cwe: "CWE-295"
pattern: |
  &tls.Config{
    $$$FIELDS,
    InsecureSkipVerify: true,
    $$$MORE,
  }
