# Go 에러 처리 규칙
# 에러 무시, 래핑 누락, 불량 패턴 탐지
---
id: go-error-ignored-blank
language: go
severity: error
message: "반환된 에러를 _ 로 무시하고 있습니다. 에러를 처리하거나 의도적 무시임을 주석으로 명시하세요."
note: "에러를 무시하면 데이터 손상이나 사일런트 실패가 발생할 수 있습니다. 최소한 err을 로깅하거나 // nolint:errcheck 주석을 추가하세요."
pattern: "$_, $ERR = $FUNC($$$ARGS)"
---
id: go-error-not-wrapped
language: go
severity: warning
message: "에러를 반환할 때 컨텍스트 없이 그대로 반환합니다. fmt.Errorf(\"operation: %w\", err) 패턴을 사용하세요."
note: "에러 래핑은 스택 트레이스 없이도 에러 경로를 추적하는 데 필수적입니다. errors.Is/As가 올바르게 동작하려면 %w 동사를 사용해야 합니다."
pattern: return $ERR
fix: 'return fmt.Errorf("TODO: operation: %w", $ERR)'
---
id: go-errors-new-in-var
language: go
severity: warning
message: "패키지 수준 변수에 errors.New()를 사용합니다. 이는 sentinel error 패턴으로, 하위 호환성에 주의하세요."
note: "sentinel error를 변수로 내보내면 패키지 API의 일부가 됩니다. 변경 시 호출자에게 브레이킹 체인지가 됩니다."
pattern: 'var $NAME = errors.New("$MSG")'
