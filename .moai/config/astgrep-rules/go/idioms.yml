# Go 관용구 규칙
# interface{} vs any, time.Since, bytes.Buffer 변환 등
---
id: go-interface-empty-not-any
language: go
severity: warning
message: "interface{}를 사용합니다. Go 1.18+에서는 any를 사용하세요."
note: "any는 interface{}의 타입 별칭으로 더 읽기 쉽습니다. Go 1.18 이상에서 권장되는 표현입니다."
pattern: interface{}
fix: any
---
id: go-time-since-manual
language: go
severity: warning
message: "time.Now().Sub(t) 대신 time.Since(t)를 사용하세요."
note: "time.Since(t)는 time.Now().Sub(t)와 동일하지만 더 가독성이 높습니다."
pattern: time.Now().Sub($T)
fix: time.Since($T)
---
id: go-bytes-buffer-string-conversion
language: go
severity: warning
message: "[]byte와 string 변환에 불필요한 할당이 있을 수 있습니다. strings.Builder를 고려하세요."
note: "string([]byte{...})는 항상 새로운 할당을 수행합니다. 반복 연결에는 strings.Builder가 효율적입니다."
pattern: "string([]byte{$$$ITEMS})"
