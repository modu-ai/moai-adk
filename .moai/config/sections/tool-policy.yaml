# ==============================================================================
# tool-policy.yaml — Tool/Permission Policy Single Source of Truth (SSOT)
# SPEC-V3R6-TOOL-POLICY-SSOT-001
# ==============================================================================
# This YAML is the single declarative source from which the .claude/settings.json
# permissions block (enforcement surface) AND this header comment (audit surface)
# are both generated. Editing a rule here + running `moai tool-policy build`
# propagates the change to both surfaces in one pass — structurally preventing
# YAML↔settings.json drift.
#
# Drift-class analogy: .moai/docs/harness-namespace-doctrine.md §24.5 (two
# independently-maintained surfaces diverging — the doctrine/enforcement drift
# that characterized the harness namespace incident). This SSOT prevents the
# ANALOGOUS drift class on the surfaces it generates (YAML↔settings.json). It
# does NOT prevent the markdown-doctrine-vs-Go-code drift literally (§X.8) —
# this file generates neither markdown doctrine nor Go enforcement source.
#
# Pattern origin: book2 ch4.3-4.4 (execpolicy — contractor with a compliance
# office), appendix B.3 (assert approval policy independently evaluable, not
# buried in code if/else).
#
# Schema origin: book1 ch08 6-field approval template made machine-readable:
#   tool + args_pattern → action    | risk_tier → risk      | owner_agent → requestor
#   decision → approval             | audit → impact + rationale
#
# Entry schema (REQ-TPS-002):
#   tool (string, required)         — Tool name (Bash, Write, WebSearch, mcp__* )
#   args_pattern (string, required) — glob/regex ("git push:*", "*", or "" for tool-level)
#   risk_tier (enum, required)      — read | write | irreversible
#   decision (enum, required)       — allow | deny | ask
#   owner_agent (string, required)  — agent role owning this rule
#   audit (string, required)        — human-readable rationale
#   source (string, optional)       — where the entry was extracted from
#   env_gate (object, optional)     — environment condition (GLM-backend rules)
#
# Query surface: `moai tool-policy list [--risk-tier|--decision|--tool FILTER]`.
# This query loads the YAML directly with its OWN schema — it is DISJOINT from
# the constitution Rule schema ({id,zone,zone_class,file,anchor,clause,
# canary_gate}) and does NOT wrap `moai constitution list` (REQ-TPS-006 / D9).
#
# Cross-references:
#   - .moai/docs/harness-namespace-doctrine.md §24.5 (drift-class analogy)
#   - .claude/rules/moai/core/zone-registry.md (declarative-policy-with-query PATTERN model)
#   - book2 ch4.3-4.4, appendix B.3 (execpolicy pattern origin)
#   - .claude/rules/moai/core/glm-web-tooling.md (GLM env_gate source, L25-35)
#   - .claude/rules/moai/core/agent-common-protocol.md L162 (background-write deny source)
#   - .claude/hooks/moai/status-transition-ownership.sh L48-69 (status-transition comment block)
# ==============================================================================

metadata:
  version: "1.0.0"
  generated_into:
    - ".claude/settings.json#permissions"
    - "internal/template/templates/.claude/settings.json.tmpl#permissions"
  cross_refs:
    - ".moai/docs/harness-namespace-doctrine.md#§24.5"
    - ".claude/rules/moai/core/zone-registry.md"
    - "book2 ch4.3-4.4, appendix B.3"

# -----------------------------------------------------------------------------
# §D.1 Irreversible-tier (highest risk — written down first per book2 ch8.4)
# Force-push, rm -rf on system paths, disk-format, database-drop. These are
# the highest-blast-radius rules; book2 ch8.4 directs they be seeded first.
# Source: .claude/settings.json permissions.deny (destructive subset).
# -----------------------------------------------------------------------------
entries:

  # --- §D.1a Force-push (history-rewriting) ---
