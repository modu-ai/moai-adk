    args_pattern: "git push --force:*"
    risk_tier: irreversible
    decision: deny
    owner_agent: orchestrator
    audit: "force-push rewrites shared history; destructive"
    source: ".claude/settings.json#permissions.deny (git push --force:*)"
  - tool: "Bash"
    args_pattern: "git push -f:*"
