workflow:
    auto_clear:
        after_plan: true
        after_run: false
        enabled: true
        token_threshold: 150000
    default_mode: ""
    execution_mode: auto
    loop_prevention:
        failure_pattern_detection: true
        max_iterations: 100
        max_retries_per_operation: 3
    team:
        auto_selection:
            min_complexity_score: 7
            min_domains_for_team: 3
            min_files_for_team: 10
        default_model: opus[1m]
        delegate_mode: true
        enabled: true
        max_teammates: 10
        # role_profile_keys: enumeration of allowed role types for the 5+1+1
        # Agent Teams composition documented in
        # .claude/rules/moai/workflow/agent-teams-pattern.md (SPEC-V3R5-WORKFLOW-OPT-001
        # Layer B). The full role_profiles map below contains all 7 profile
        # definitions; this list restricts which keys participate in the
        # 5+1+1 spawn pattern (implementer × 5 + tester × 1 + reviewer × 1).
        # Requires: CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1 in settings.json env.
        role_profile_keys:
            - implementer
            - tester
            - reviewer
        patterns:
            design_implementation:
                description: Cross-layer feature implementation with UI/UX design
                model: inherit
                roles:
                    - designer
                    - backend-dev
                    - frontend-dev
                    - tester
            full_stack:
                description: Full-stack implementation with quality gate
                model: inherit
                roles:
                    - api-layer
                    - ui-layer
                    - data-layer
                    - quality
            implementation:
                description: Cross-layer feature implementation
                model: inherit
                roles:
                    - backend-dev
                    - frontend-dev
                    - tester
            investigation:
                description: Competing hypothesis debugging
                model: haiku
                roles:
                    - hypothesis-1
                    - hypothesis-2
                    - hypothesis-3
            plan_research:
                description: Parallel SPEC research and design
                model: inherit
                roles:
                    - researcher
                    - analyst
                    - architect
            review:
                description: Multi-perspective code review
                model: inherit
                roles:
                    - security-reviewer
                    - perf-reviewer
                    - quality-reviewer
                    - ux-reviewer
        require_plan_approval: true
        role_profiles:
            analyst:
                description: Requirements analysis and validation
                isolation: none
                mode: plan
                model: sonnet
            architect:
                description: Solution design and architecture decisions (deep reasoning)
                isolation: none
                mode: plan
                model: opus
            designer:
                description: UI/UX design with MCP design tools
                isolation: worktree
                mode: acceptEdits
                model: sonnet
            implementer:
                description: Code implementation (backend, frontend, full-stack)
                isolation: worktree
                mode: acceptEdits
                model: sonnet
            researcher:
                description: Read-only codebase exploration and analysis (speed-critical)
                isolation: none
                mode: plan
                model: haiku
            reviewer:
                description: Code review and quality validation (context-aware analysis)
                isolation: none
                mode: plan
                model: sonnet
            tester:
                description: Test creation and coverage validation
                isolation: worktree
                mode: acceptEdits
                model: sonnet
    token_budget:
        plan: 30000
        run: 180000
        sync: 40000
    worktree:
        # 2026-05-22: auto_create false (user policy feedback_worktree_autonomous 정렬).
        # L1 worktree는 Claude Code runtime autonomous — MoAI orchestrator는 자동 생성 안함.
        # auto_merge/auto_cleanup 유지 (사용자 수동 worktree 생성 시에만 자동 머지/정리).
        auto_cleanup: true
        auto_create: false
        auto_merge: true
        session_name_pattern: moai-{ProjectName}-{SPEC-ID}
        tmux_preferred: true
