document_management:
    block_root_pollution: true
    directories:
        cache:
            auto_cleanup: true
            base: .moai/cache/
            retention_days: 30
        docs:
            base: .moai/docs/
            retention_days: null
        logs:
            base: .moai/logs/
            retention_days: 30
        temp:
            auto_cleanup: true
            base: .moai/temp/
            retention_days: 7
    enabled: true
    enforce_structure: true
    separation_policy:
        description: Clear separation between logs (runtime data) and docs (documentation content)
        docs_scope: reports, analysis, validation, sync, inspection, documentation files
        logs_scope: runtime sessions, errors, execution traces, agent transcripts
        strict_separation: true
github:
    auto_delete_branches: true
    enable_trust_5: true
    spec_git_workflow: feature_branch
moai:
    template_version: v2.17.0
    update_check_frequency: daily
    version: v2.17.0
    version_check:
        cache_ttl_hours: 24
        enabled: true
hook:
    # Events available for observability opt-in (RETIRE-OBS-ONLY from settings.json)
    # These events have no business logic in moai v3; they emit structured logs only when opted in.
    # Valid values: notification, elicitation, elicitationResult, taskCreated
    observability_events: []
    # Strict mode: if true, all hook failures block execution. Used by SPEC-V3R2-RT-001.
    strict_mode: false
