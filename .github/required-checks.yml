version: 1
# SSoT for required CI status checks (REQ-CIAUT-027 / AC-CIAUT-021).
# Consumed by:
#   - internal/cli/branch_protection.go (renders gh api PUT branch protection JSON)
#   - Wave 2 CI watch loop (filters required vs auxiliary failures)
# Update: edit this file ONLY. Hardcoding contexts elsewhere is prohibited (AC-CIAUT-021).

branches:
  main:
    contexts:
      - Lint
      - "Test (ubuntu-latest)"
      - "Test (macos-latest)"
      - "Test (windows-latest)"
      - "Build (linux/amd64)"
      - "Build (linux/arm64)"
      - "Build (darwin/amd64)"
      - "Build (darwin/arm64)"
      - "Build (windows/amd64)"
      - CodeQL
  release/*:
    contexts:
      - Lint
      - "Test (ubuntu-latest)"
      - "Test (macos-latest)"
      - "Test (windows-latest)"
      - "Build (linux/amd64)"
      - "Build (linux/arm64)"
      - "Build (darwin/amd64)"
      - "Build (darwin/arm64)"
      - "Build (windows/amd64)"
      - CodeQL
    # Wave 3 2026-06-24: release/* now matches main exactly. All 10 contexts
    # below are emitted by ci.yml + codeql.yml on release/* → main PRs (both
    # workflows trigger on pull_request without branch-name restriction, so a
    # PR from a release/* head_ref into main gets the full matrix). Matrix
    # alignment verified against ci.yml:
    #   test matrix os: [ubuntu-latest, macos-latest, windows-latest]
    #   build matrix: linux/amd64, linux/arm64, darwin/amd64, darwin/arm64, windows/amd64
    #   (ci.yml has NO windows/arm64 build — not added here to avoid phantom context.)

# Auxiliary checks run on PRs but DO NOT block merge (advisory only).
# Wave 2 watch loop reads this list to discriminate failures.
auxiliary:
  - docs-i18n-check
