name: GLM Code Review
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup GLM Environment
        uses: ./.github/actions/setup-glm-env

      - name: Detect Language
        id: detect
        uses: ./.github/actions/detect-language

      - name: Run GLM Review
        shell: bash
        env:
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}}

        run: |
          glm code-review --diff
