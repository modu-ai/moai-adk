name: Claude Code

# Claude Code GitHub Action — PR code review + issue troubleshooting.
# (Wave 3 2026-06-24: repurposed from Issue-only to dual-purpose. The legacy
# claude-code-review.yml was removed 2026-06-24 because Claude CLI is not
# pre-installed on runners; this file now owns both surfaces via two jobs
# sharing one concurrency group.)
#
# Job A (claude-pr-review): fires on pull_request (incl. release/* → main),
#   runs claude-code-action in automation/review mode with a review-focused
#   prompt. Posts an advisory PR review (NOT a required status check — GitHub
#   distinguishes reviews from checks; see docs/custom-automations.md).
# Job B (claude-interactive): fires on issue_comment + issues, responds to
#   @claude mentions in interactive mode (no prompt input). Works on BOTH
#   issues AND PR comments (the !github.event.issue.pull_request exclusion
#   was removed so @claude works on PR comments too).

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned]

# Concurrency: one in-flight run per PR/issue/comment. The expression evaluates
# to the PR number on pull_request events, the issue number on issue/PR-comment
# events (issue_comment populates github.event.issue even for PR comments), or
# the comment id as a last-resort tiebreaker.
concurrency:
  group: claude-${{ github.event.pull_request.number || github.event.issue.number || github.event.comment.id }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Job A: Automated PR code review (claude-code-action automation mode).
  # The action auto-detects review mode when (1) the event is pull_request and
  # (2) a prompt input is provided. It posts a PR REVIEW (advisory, visible in
  # the PR's "Files changed" / conversation), NOT a status check — so it CANNOT
  # be listed in required-checks.yml as a merge-blocking context. Mechanical
  # merge-blocking would require a separate check-emitting job (out of scope).
  # ---------------------------------------------------------------------------
  claude-pr-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write  # post review comments on the PR
      issues: read
      # C2 audit (Wave 2): id-token: write was previously granted on the claim
      # that claude-code-action needs OIDC for Anthropic API auth. Verified the
      # action authenticates via the claude_code_oauth_token secret (bearer/OAuth
      # token) directly — no cloud-provider OIDC exchange step exists in this
      # workflow. Per least-privilege, id-token: write is REMOVED. If a future
      # change introduces a cloud-provider OIDC exchange, re-add it then.
    steps:
      - name: Checkout repository
        # Pinned to commit SHA to prevent supply chain attacks via floating tags.
        # Tag: v4.1.1 | SHA: 08c6903cd8c0fde910a37f88322edcfb5dd907a8 (Node 20 runtime)
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0  # PR review needs full diff history

      - name: Setup Go
        # Tag: v6.0.0 | SHA: 44694675825211faa026b3c33043df3e48a5fa00 (Node 24 runtime)
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Claude Code (PR review)
        # Pinned to commit SHA to prevent supply chain attacks via floating tags.
        # Tag: v1.0.82 | SHA: 567fe954a4527e81f132d87d1bdbcc94f7737434
        # The action auto-detects PR review mode when the event is pull_request
        # AND a prompt input is provided (per docs/custom-automations.md §
        # "Author-Specific Code Reviews"). Without a prompt it would fall back
        # to interactive @claude-mention mode, which is not what this job wants.
        uses: anthropics/claude-code-action@80b31826338489861333dc17217865dfe8085cdc
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Review-focused prompt. The action runs in automation mode (no @claude
          # mention needed) and posts an advisory review to the PR conversation.
          prompt: |
            Review this pull request diff for bugs, security issues, and correctness.
            Focus on the changed files. Flag concrete defects with file:line anchors;
            do not comment on style already covered by linters.
          # Use Opus model with high effort for deeper reasoning on review.
          # C4 history: 80-turn budget proven sufficient on complex multi-file
          # investigations (run #24700719267 issue #683 set the baseline).
          claude_args: |
            --model claude-opus-4-7
            --effort high
            --max-turns 80

  # ---------------------------------------------------------------------------
  # Job B: Interactive @claude troubleshooting on issues AND PR comments.
  # No prompt input → action runs in interactive mode (responds to @claude
  # mentions, creates tracking comments). The !github.event.issue.pull_request
  # guard was REMOVED so @claude works on PR comments too, not just issues.
  # ---------------------------------------------------------------------------
  claude-interactive:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') &&
       (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
       (github.event.issue.author_association == 'OWNER' || github.event.issue.author_association == 'MEMBER' || github.event.issue.author_association == 'COLLABORATOR'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write  # @claude can act on PR comments too
      issues: read
      # id-token REMOVED — see C2 audit note in claude-pr-review job above.
    steps:
      - name: Checkout repository
        # Pinned to commit SHA to prevent supply chain attacks via floating tags.
        # Tag: v4.1.1 | SHA: 08c6903cd8c0fde910a37f88322edcfb5dd907a8
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 1

      - name: Setup Go
        # Tag: v6.0.0 | SHA: 44694675825211faa026b3c33043df3e48a5fa00 (Node 24 runtime)
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Claude Code (interactive @claude)
        # Pinned to commit SHA to prevent supply chain attacks via floating tags.
        # Tag: v1.0.82 | SHA: 567fe954a4527e81f132d87d1bdbcc94f7737434
        # No prompt input → interactive mode (responds to @claude mentions).
        uses: anthropics/claude-code-action@80b31826338489861333dc17217865dfe8085cdc
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # C4 Fix: Use claude_args for max-turns (max_turns input is deprecated).
          # Use Opus model with high effort for better reasoning on issue fixes.
          # History:
          #   C4a: 20 — initial value, exceeded on moderate issues
          #   C4b: 20 → 40 — still exceeded on complex multi-file issues
          #   C4c: 40 → 80 — run #24700719267 (issue #683 LSP TypeScript detection)
          #        hit error_max_turns at 40. Multi-language LSP investigation requires
          #        reading many files + cross-referencing config — 80 budget is safer.
          claude_args: |
            --model claude-opus-4-7
            --effort high
            --max-turns 80
