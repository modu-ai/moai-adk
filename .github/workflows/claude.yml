name: Claude Code Review (Issue)
on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Language
        id: detect
        uses: ./.github/actions/detect-language

      - name: Setup Claude
        shell: bash
        run: |
          if ! command -v claude &> /dev/null; then
            echo "::error::Claude CLI not found. Install from https://claude.ai/download"
            exit 1
          fi

      - name: Run Claude Review
        shell: bash
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}}
        run: |
          claude code review --diff ${{ github.event.issue.body }}}
