name: Release Drafter

# Enhanced GitHub Flow §18.9 자동화
# PR이 main에 머지될 때마다 next release의 draft notes를 자동 업데이트.
# Draft 내용은 수동으로 CHANGELOG.md에 반영한 후 ./scripts/release.sh 실행.

on:
  push:
    branches:
      - main
  # pull_request 트리거 제거 (2026-05): GitHub Releases API 가 PR ref(refs/pull/N/merge)를
  # target_commitish 로 받지 못하므로 모든 PR check 가 빨간 X 노이즈로 남는 문제 발생.
  # main push 시에만 draft 갱신; PR 단계에서 preview 가 필요하면 workflow_dispatch 사용.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-drafter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update_release_draft:
    name: Update Release Draft
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Run Release Drafter
        uses: release-drafter/release-drafter@v7
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
