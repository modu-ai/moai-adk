name: Auto Merge

on:
  # automerge 레이블이 수동으로 추가될 때 트리거
  pull_request_target:
    types: [labeled]
  # CI 또는 Review Quality Gate 완료 시 재검사
  check_suite:
    types: [completed]
  workflow_run:
    workflows: ["CI", "Review Quality Gate"]
    types: [completed]

# 동일 PR에 대한 중복 실행 방지
concurrency:
  group: automerge-${{ github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number || github.run_id }}
  cancel-in-progress: true

jobs:
  automerge:
    # automerge 레이블이 있는 PR에 대해서만 실행 (수동 레이블 추가 필요)
    if: |
      (github.event_name == 'pull_request_target' && github.event.label.name == 'automerge') ||
      github.event_name == 'check_suite' ||
      github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Auto-merge PRs with automerge label
        uses: pascalgn/automerge-action@v0.16.4
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          MERGE_METHOD: "squash"
          MERGE_DELETE_BRANCH: "true"
          # MERGE_LABELS: "automerge" means only PRs with this label will be merged.
          # The label must be added manually to opt-in (no automatic labeling).
          MERGE_LABELS: "automerge"
          UPDATE_LABELS: ""
          MERGE_COMMIT_MESSAGE: "pull-request-title-and-description"
          MERGE_RETRIES: "6"
          MERGE_RETRY_SLEEP: "10000"
