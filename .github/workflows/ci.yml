name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]  # main으로 향하는 모든 PR에서 CI 실행

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Test: Run tests on all platforms with race detector and coverage
  # ---------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Run tests with race detector
        shell: bash
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ---------------------------------------------------------------------------
  # Lint: Static analysis with golangci-lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Install golangci-lint from source
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m

  # ---------------------------------------------------------------------------
  # Build: Cross-compile for all target platforms
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Cross-compile binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          BINARY_NAME="moai-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          go build -ldflags="-s -w" -o "${BINARY_NAME}" ./cmd/moai/
          echo "Built ${BINARY_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: moai-${{ matrix.goos }}-${{ matrix.goarch }}
          path: moai-${{ matrix.goos }}-${{ matrix.goarch }}*
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Constitution Check: Verify FROZEN/EVOLVABLE zone registry integrity
  # SPEC-V3R2-CON-001 — continue-on-error so CI doesn't block on missing registry
  # ---------------------------------------------------------------------------
  constitution-check:
    name: Constitution Check
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Build binary
        run: go build -ldflags="-s -w" -o bin/moai ./cmd/moai/

      - name: Verify zone registry (list)
        run: |
          MOAI_CONSTITUTION_REGISTRY=.claude/rules/moai/core/zone-registry.md \
            ./bin/moai constitution list --format json | \
            python3 -c "import json,sys; d=json.load(sys.stdin); print(f'entries: {len(d[\"entries\"])}')"

      - name: Verify zone registry (frozen entries)
        run: |
          MOAI_CONSTITUTION_REGISTRY=.claude/rules/moai/core/zone-registry.md \
            ./bin/moai constitution list --zone frozen | tail -1
