name: CI

# Template Internal-Content Isolation Policy:
# The 'Run tests with race detector and coverage' step below executes
# `go test ./...` which includes TestTemplateNoInternalContentLeak in
# internal/template/internal_content_leak_test.go. This test enforces
# CLAUDE.local.md §25 (Template Internal-Content Isolation): the template
# directory (internal/template/templates/) must not contain moai-adk
# dev-internal-content tokens (SPEC IDs, REQ/AC tokens, audit citations,
# internal session dates, internal archive paths, internal commit SHAs,
# internal memory hash references). Failure mode:
# TestTemplateNoInternalContentLeak reports offending file path + leak
# class. Policy rationale memory feedback:
# /Users/goos/.claude/projects/-Users-goos-MoAI-moai-adk-go/memory/feedback_template_internal_content_isolation.md

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]  # main으로 향하는 모든 PR에서 CI 실행

# Least-privilege baseline. Job-level overrides (none needed here — this
# workflow only reads + uploads coverage to Codecov). Codecov upload does
# not require a write scope on GITHUB_TOKEN; the codecov-action uses its
# own CODECOV_TOKEN. Artifact upload (upload-artifact) needs no extra scope.
permissions:
  contents: read

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect: paths-filter to classify PR diff as docs-only or go-code
  # SPEC-V3R4-CI-FASTTRACK-001 REQ-CIFT-001 — AD-001/AD-002
  # ---------------------------------------------------------------------------
  detect:
    name: Detect (paths-filter)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      go_code: ${{ steps.f.outputs.go_code }}
      docs_only: ${{ steps.f.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: f
        with:
          filters: |
            docs_only:
              - '**.md'
              - '.moai/specs/**'
              - '.moai/docs/**'
              - '.moai/reports/**'
              - '.moai/research/**'
              - '.claude/rules/**'
              - '.claude/skills/**'
              - 'docs-site/**'
              - 'CHANGELOG.md'
              - 'LICENSE'
              - 'NOTICE'
            go_code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - '.github/workflows/ci.yml'
              - '.github/workflows/codeql.yml'

  # ---------------------------------------------------------------------------
  # Test: Run tests on all platforms with race detector and coverage
  # Gated by detect: only runs when go_code changes are present
  # ---------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: detect
    if: needs.detect.outputs.go_code == 'true'
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # SPEC-V3R4-CI-INFRA-FIX-001 D-3 (C-Scope-1): drift walker test 가 full git history 필요

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Assert zero exec.Command in MX validator (AC-UTIL-001-04)
        if: matrix.os == 'ubuntu-latest'
        run: |
          count=$(grep -r "exec\.Command\|\"os/exec\"" internal/hook/mx/ --include="*.go" | grep -v "_test\.go" | grep -v "complexity/" | wc -l)
          if [ "$count" -ne "0" ]; then
            echo "FAIL: exec.Command found in internal/hook/mx/ (AC-UTIL-001-04):"
            grep -r "exec\.Command\|\"os/exec\"" internal/hook/mx/ --include="*.go" | grep -v "_test\.go" | grep -v "complexity/"
            exit 1
          fi
          echo "PASS: zero exec.Command in internal/hook/mx/ (AC-UTIL-001-04)"

      - name: Run MX validator tests (Windows cross-platform AC-UTIL-001-05)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: go test -race ./internal/hook/mx/...

      # Linux + macOS: race detector + coverage (codecov upload from ubuntu only)
      - name: Run tests with race detector and coverage
        if: matrix.os != 'windows-latest'
        shell: bash
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      # Windows: race detector retained for cross-platform concurrency safety,
      # but coverage profile generation is skipped because codecov upload only
      # runs on ubuntu-latest (the file would be discarded). This shaves ~30-60s
      # off Windows test time without losing race detection coverage.
      - name: Run tests with race detector (Windows, no coverage)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: go test -race ./...

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v7
        with:
          files: coverage.out
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ---------------------------------------------------------------------------
  # Test Skip-Marker: For docs-only PRs, emit SUCCESS for required check names
  # without running the actual Go test suite.
  # SPEC-V3R4-CI-FASTTRACK-001 REQ-CIFT-001 — branch-protection name match
  # Critical: name MUST match exactly "Test (${{ matrix.os }})" for required check compat
  # ---------------------------------------------------------------------------
  test-skip-marker:
    name: Test (${{ matrix.os }})
    runs-on: ubuntu-latest
    needs: detect
    timeout-minutes: 5
    # EC-1 mutual exclusivity guard: mixed PR (docs + Go code) runs real test only, NOT skip-marker.
    # Without this guard, both jobs would emit Test (X) check-runs on mixed PRs, wasting compute.
    if: needs.detect.outputs.docs_only == 'true' && needs.detect.outputs.go_code != 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Skip (docs-only PR)
        run: echo "Docs-only PR — Go test matrix skipped per paths-filter (SPEC-V3R4-CI-FASTTRACK-001)"

  # ---------------------------------------------------------------------------
  # Integration Tests: Harness Learning Subsystem (SPEC-V3R3-HARNESS-LEARNING-001)
  # build tag `integration`으로 격리된 통합 테스트를 별도 job으로 실행한다.
  # Depends on test: if test is skipped (docs-only PR), this also skips naturally.
  # ---------------------------------------------------------------------------
  test-integration:
    name: Integration Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # SPEC-V3R4-CI-INFRA-FIX-001 D-3 (C-Scope-1): drift walker test 가 full git history 필요

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run harness integration tests
        shell: bash
        run: go test -tags=integration -race -timeout 180s ./test/integration/harness/...

  # ---------------------------------------------------------------------------
  # Lint: Static analysis with golangci-lint (always runs — fast, required check)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # SPEC-V3R4-CI-INFRA-FIX-001 D-3 (C-Scope-1): drift walker test 가 full git history 필요

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install golangci-lint from source
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6

      # templ codegen drift guard (SPEC-WEB-CONSOLE-006): the committed *_templ.go
      # files are source artifacts. Regenerate from the *.templ sources and fail if
      # the committed output is stale. golangci-lint skips the generated files via
      # their `// Code generated by templ - DO NOT EDIT.` header (default exclusion).
      - name: Verify templ codegen is not stale
        run: |
          go run github.com/a-h/templ/cmd/templ generate -path ./internal/web
          git diff --exit-code -- 'internal/web/*_templ.go'

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m

      - name: Build moai binary for agent lint
        run: go build -o ./bin/moai ./cmd/moai/

      - name: Run moai agent lint
        run: ./bin/moai agent lint

  # ---------------------------------------------------------------------------
  # Build: Cross-compile for all target platforms (always runs — required check)
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # SPEC-V3R4-CI-INFRA-FIX-001 D-3 (C-Scope-1): drift walker test 가 full git history 필요

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Cross-compile binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          BINARY_NAME="moai-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          go build -ldflags="-s -w" -o "${BINARY_NAME}" ./cmd/moai/
          echo "Built ${BINARY_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: moai-${{ matrix.goos }}-${{ matrix.goarch }}
          path: moai-${{ matrix.goos }}-${{ matrix.goarch }}*
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Constitution Check: Verify FROZEN/EVOLVABLE zone registry integrity
  # SPEC-V3R2-CON-001 — continue-on-error so CI doesn't block on missing registry
  # Always runs (fast, advisory-only)
  # ---------------------------------------------------------------------------
  constitution-check:
    name: Constitution Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # SPEC-V3R4-CI-INFRA-FIX-001 D-3 (C-Scope-1): drift walker test 가 full git history 필요

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: go build -ldflags="-s -w" -o bin/moai ./cmd/moai/

      - name: Verify zone registry (list)
        run: |
          MOAI_CONSTITUTION_REGISTRY=.claude/rules/moai/core/zone-registry.md \
            ./bin/moai constitution list --format json | \
            python3 -c "import json,sys; d=json.load(sys.stdin); print(f'entries: {len(d[\"entries\"])}')"

      - name: Verify zone registry (frozen entries)
        run: |
          MOAI_CONSTITUTION_REGISTRY=.claude/rules/moai/core/zone-registry.md \
            ./bin/moai constitution list --zone frozen | tail -1
