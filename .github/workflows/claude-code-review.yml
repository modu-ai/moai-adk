name: Claude Code Review

on:
  pull_request:
    # C3 Fix: Removed 'synchronize' to prevent a full review on every commit push.
    # 'synchronize' was triggering N reviews for N commits in a PR (unbounded cost).
    types: [opened, ready_for_review, reopened]
    # Optional: Only run on specific file changes (uncomment to reduce unnecessary runs)
    # paths:
    #   - "**/*.go"
    #   - "**/*.ts"
    #   - "**/*.tsx"

# I1 Fix: Added concurrency control to prevent duplicate parallel runs on the same PR.
concurrency:
  group: claude-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    # I2 Fix: Added timeout to prevent runaway jobs (default was 360 min).
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
      issues: read
      # C2 Fix: id-token: write is required by claude-code-action for OIDC-based
      # authentication to Anthropic's API when using OAuth tokens.
      # See: https://github.com/anthropics/claude-code-action
      id-token: write

    steps:
      - name: Checkout repository
        # C1 Fix: Pinned to commit SHA to prevent supply chain attacks via floating tags.
        # Tag: v4.3.1 | SHA: 34e114876b0b11c390a56381ad16ebd13914f8d5
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        # C1 Fix: Pinned to commit SHA to prevent supply chain attacks via floating tags.
        # Tag: v1 | SHA: 1dd74842e568f373608605d9e45c9e854f65f543
        uses: anthropics/claude-code-action@ba7fa4bcf054319261202aef93d71a89112a8d00
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # Use Opus model with high effort for thorough code reviews.
          # C4 Fix: Added --max-turns to cap runaway executions and control costs.
          claude_args: |
            --model opus
            --effort high
            --max-turns 10
