name: Claude Code Review (PR)
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    # SPEC-V2.20.0-RC1 hotfix: Claude CLI is not pre-installed on GitHub runners.
    # Until a proper install step is added (or this job migrates to the official
    # Anthropic action), keep the job advisory: failures must not block PRs.
    # Tracked by follow-up SPEC-LINT-DEBT-CLEAN-001 along with other CI debt.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          # SHA-pin broken range exclusion (REQ-CI-018.1)
          fetch-depth: 0  # Full history for accurate diff

      - name: Detect Language
        id: detect
        uses: ./.github/actions/detect-language

      - name: Setup Claude
        shell: bash
        run: |
          if ! command -v claude &> /dev/null; then
            echo "::warning::Claude CLI not found on runner — review step will be skipped"
            exit 0
          fi

      - name: Get Changed Files
        id: changes
        shell: bash
        run: |
          # Get list of changed files (excluding merge commits)
          git diff --name-only origin/main...HEAD | grep -v '^$' > /tmp/changed_files.txt
          echo "files_count=$(wc -l < /tmp/changed_files.txt)" >> $GITHUB_OUTPUT

      - name: Run Claude Review
        shell: bash
        if: ${{ hashFiles('/tmp/changed_files.txt') != '' }}
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if ! command -v claude &> /dev/null; then
            echo "::warning::Claude CLI not available — skipping review"
            exit 0
          fi
          claude code review $(cat /tmp/changed_files.txt)
