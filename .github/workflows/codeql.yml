name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan: Monday at 06:00 UTC
    - cron: "0 6 * * 1"

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect: paths-filter to classify PR diff as docs-only or go-code
  # SPEC-V3R4-CI-FASTTRACK-001 REQ-CIFT-002a/b — mirrors ci.yml detect job
  # Only active on pull_request events; push/schedule always runs analyze.
  # ---------------------------------------------------------------------------
  detect:
    name: Detect (paths-filter)
    runs-on: ubuntu-latest
    # Only needed for PR context; push/schedule bypass via analyze job conditions
    outputs:
      go_code: ${{ steps.f.outputs.go_code }}
      docs_only: ${{ steps.f.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: f
        with:
          filters: |
            docs_only:
              - '**.md'
              - '.moai/specs/**'
              - '.moai/docs/**'
              - '.moai/reports/**'
              - '.moai/research/**'
              - '.claude/rules/**'
              - '.claude/skills/**'
              - 'docs-site/**'
              - 'CHANGELOG.md'
              - 'LICENSE'
              - 'NOTICE'
            go_code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - '.github/workflows/ci.yml'
              - '.github/workflows/codeql.yml'

  # ---------------------------------------------------------------------------
  # Analyze: Full CodeQL analysis — runs when go_code present OR push/schedule
  # ---------------------------------------------------------------------------
  analyze:
    name: Analyze (Go)
    runs-on: ubuntu-latest
    needs: detect
    # Run on go-code PRs; always run on push to main and scheduled scans
    if: >
      needs.detect.outputs.go_code == 'true' ||
      github.event_name == 'push' ||
      github.event_name == 'schedule'

    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [go]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  # ---------------------------------------------------------------------------
  # Analyze Skip-Marker: For docs-only PRs, emit SUCCESS for CodeQL required check
  # without running the actual CodeQL analysis.
  # SPEC-V3R4-CI-FASTTRACK-001 REQ-CIFT-002a/b
  # Critical: name matches "Analyze (Go)" + matrix language: [go] →
  #           emits check-run name "Analyze (Go) (go)" (same as real analyze job).
  #           Branch protection "CodeQL" entry uses legacy workflow-name match —
  #           any job in this workflow satisfies it regardless of job name.
  # Wave 0 confirmed: "Analyze (Go) (go)" is the live check-run name.
  # ---------------------------------------------------------------------------
  analyze-skip-marker:
    name: Analyze (Go)
    runs-on: ubuntu-latest
    needs: detect
    # EC-1 mutual exclusivity guard: mixed PR (docs + Go code) runs real analyze only, NOT skip-marker.
    if: needs.detect.outputs.docs_only == 'true' && needs.detect.outputs.go_code != 'true' && github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        language: [go]
    steps:
      - name: Skip (docs-only PR)
        run: echo "Docs-only PR — CodeQL analysis skipped via skip-marker (SPEC-V3R4-CI-FASTTRACK-001)"
