# Standardized label definitions for moai-adk-go
# Compatible with EndBug/label-sync or manual reference
#
# Usage with EndBug/label-sync:
#   - uses: EndBug/label-sync@v2
#     with:
#       config-file: .github/labels.yml

# --- Type ---
- name: bug
  color: "d73a4a"
  description: "Something is not working"

- name: enhancement
  color: "0075ca"
  description: "New feature or improvement request"

- name: question
  color: "8b5cf6"
  description: "Questions or discussions"

- name: documentation
  color: "0e8a16"
  description: "Documentation improvements"

# --- Priority ---
- name: "priority:critical"
  color: "b60205"
  description: "Critical priority - requires immediate attention"

- name: "priority:high"
  color: "d93f0b"
  description: "High priority - should be addressed soon"

- name: "priority:medium"
  color: "fbca04"
  description: "Medium priority - normal queue"

- name: "priority:low"
  color: "c2c2c2"
  description: "Low priority - when time permits"

# --- Status ---
- name: "help wanted"
  color: "008672"
  description: "Extra attention is needed"

- name: "good first issue"
  color: "7ae07a"
  description: "Good for newcomers"

- name: wontfix
  color: "ffffff"
  description: "This will not be worked on"

- name: duplicate
  color: "cfd3d7"
  description: "This issue or pull request already exists"

- name: stale
  color: "ededed"
  description: "Marked as stale due to inactivity"

- name: pinned
  color: "006b75"
  description: "Pinned and exempt from stale bot"

- name: security
  color: "ee0701"
  description: "Security-related issue"

# --- Scope ---
- name: go
  color: "00add8"
  description: "Go source code changes"

- name: tests
  color: "bfd4f2"
  description: "Test file changes"

- name: docs
  color: "0e8a16"
  description: "Documentation file changes"

- name: ci
  color: "e3d21c"
  description: "CI/CD and GitHub Actions changes"

- name: config
  color: "d4c5f9"
  description: "Configuration file changes (.moai, .claude)"

- name: templates
  color: "c5def5"
  description: "Template file changes"

- name: hooks
  color: "f9d0c4"
  description: "Hook system changes"

# --- AI ---
- name: ai-generated
  color: "0d9488"
  description: "Content generated by AI"

- name: ai-reviewed
  color: "06b6d4"
  description: "Reviewed by AI"

- name: coderabbit
  color: "a5d8ff"
  description: "Reviewed by CodeRabbit"

# --- Dependencies ---
- name: dependencies
  color: "0366d6"
  description: "Dependency updates"

# ============================================================================
# Enhanced GitHub Flow 3축 체계 (CLAUDE.local.md §18.6)
# type: / priority: / area: 접두사는 2026-04-24부터 공식 표준
# ============================================================================

# --- type:* (required, 1개 PR당 1 type) ---
- name: "type:feature"
  color: "1f883d"
  description: "New feature or capability"

- name: "type:fix"
  color: "d73a4a"
  description: "Bug fix"

- name: "type:docs"
  color: "0075ca"
  description: "Documentation only change"

- name: "type:chore"
  color: "fbca04"
  description: "Maintenance (dependencies, cleanup)"

- name: "type:ci"
  color: "e3d21c"
  description: "CI/CD or GitHub Actions change"

- name: "type:refactor"
  color: "d2dae6"
  description: "Code restructuring without behavior change"

- name: "type:security"
  color: "ee0701"
  description: "Security fix or hardening"

- name: "type:test"
  color: "d876e3"
  description: "Test addition or improvement"

# --- priority:* (required) ---
- name: "priority:P0"
  color: "b60205"
  description: "Critical — immediate response required"

- name: "priority:P1"
  color: "d93f0b"
  description: "High — within 24 hours"

- name: "priority:P2"
  color: "fbca04"
  description: "Medium — this sprint"

- name: "priority:P3"
  color: "85e89d"
  description: "Low — backlog"

- name: "priority:P4"
  color: "c2c2c2"
  description: "Icebox — deferred indefinitely"

# --- area:* (required, multiple allowed for cross-cutting PRs) ---
- name: "area:mx"
  color: "5319e7"
  description: "MX validator subsystem"

- name: "area:astgrep"
  color: "5319e7"
  description: "ast-grep integration subsystem"

- name: "area:lsp"
  color: "5319e7"
  description: "LSP subsystem"

- name: "area:hooks"
  color: "f9d0c4"
  description: "Hook system"

- name: "area:docs-site"
  color: "0e8a16"
  description: "docs-site (Hugo 4-locale documentation)"

- name: "area:templates"
  color: "c5def5"
  description: "internal/template/templates/ (project templates)"

- name: "area:cli"
  color: "00add8"
  description: "CLI commands and UX"

- name: "area:config"
  color: "d4c5f9"
  description: "Configuration files (.moai/, .claude/)"

- name: "area:workflow"
  color: "1d76db"
  description: "SPEC workflow (plan/run/sync)"

- name: "area:ci"
  color: "e3d21c"
  description: "CI/CD infrastructure"

- name: "area:security"
  color: "ee0701"
  description: "Security-related area"

- name: "area:deps"
  color: "0366d6"
  description: "External dependencies"

# --- status:* (optional, progress tracking) ---
- name: "status:in-progress"
  color: "ffd700"
  description: "Currently being worked on"

- name: "status:review"
  color: "0075ca"
  description: "In code review"

- name: "status:blocked"
  color: "d73a4a"
  description: "Blocked on external dependency"

- name: "status:needs-info"
  color: "ffffa5"
  description: "Waiting for additional information from reporter"
