git_strategy:
    # Enhanced GitHub Flow (CLAUDE.local.md §18)
    # v2.14.0 이후 공식 채택. Gitflow 비채택 결정.
    workflow_model: enhanced-github-flow
    base_branch: main
    merge_strategies:
        feature: squash      # feat/ fix/ docs/ chore/ refactor/ plan/ → squash
        release: merge       # release/vX.Y.Z → main: 반드시 merge commit (SPEC history 보존)
        hotfix: merge        # hotfix/vX.Y.Z-* → main: merge commit
        dependabot: squash   # auto-merge squash
    branch_types:
        feature: "feat/SPEC-"
        fix: "fix/"
        docs: "docs/"
        chore: "chore/"
        ci: "ci/"
        refactor: "refactor/"
        audit: "audit/"
        release: "release/"
        hotfix: "hotfix/"
        plan: "plan/"
    release_cadence:
        patch: "as-needed (critical fix only)"
        minor: "1-2 weeks (SPEC cluster)"
        major: "3-6 months (breaking changes)"
    release_tools:
        tag_script: "scripts/release.sh"
        make_target: "make release V=vX.Y.Z"
        automation: "goreleaser (on tag push)"
    github_username: ""
    gitlab:
        instance_url: ""
    manual:
        auto_checkpoint: disabled
        automation:
            auto_branch: false
            auto_commit: true
            auto_pr: false
            auto_push: false
        branch_creation:
            auto_enabled: false
            prompt_always: true
        commit_style:
            format: conventional
            scope_required: false
        environment: local
        github_integration: false
        hooks:
            commit_msg: warn
            pre_commit: enforce
            pre_push: warn
        push_to_remote: false
        workflow: github-flow
    mode: team
    personal:
        automation:
            auto_branch: false
            auto_commit: true
            auto_pr: false
            auto_push: false
        branch_creation:
            auto_enabled: false
            prompt_always: true
        branch_prefix: feature/SPEC-
        commit_style:
            format: conventional
            scope_required: false
        environment: github
        github_integration: true
        hooks:
            commit_msg: warn
            pre_commit: enforce
            pre_push: warn
        main_branch: main
        push_to_remote: true
        workflow: github-flow
    provider: github
    team:
        automation:
            auto_branch: true
            auto_commit: true
            auto_pr: true
            auto_push: true
        branch_creation:
            auto_enabled: true
            prompt_always: false
        branch_prefix: feature/SPEC-
        branch_protection: true
        commit_style:
            format: conventional
            scope_required: true
        draft_pr: true
        environment: github
        github_integration: true
        hooks:
            commit_msg: warn
            pre_commit: enforce
            pre_push: warn
        main_branch: main
        push_to_remote: true
        required_reviews: 1
        workflow: github-flow
