baseURL = "https://adk.mo.ai.kr/"
title = "MoAI-ADK Documentation"
languageCode = "ko-KR"
defaultContentLanguage = "ko"
defaultContentLanguageInSubdir = true
hasCJKLanguage = true
enableGitInfo = true
enableRobotsTXT = true
theme = "hugo-geekdoc"

# Geekdoc 권장 설정
pluralizeListTitles = false
disablePathToLower = true

# 코드 하이라이팅
[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.goldmark.parser.attribute]
    block = true
    title = true
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 9
  [markup.highlight]
    style = "tokyonight-night"
    lineNos = false
    noClasses = false

# Geekdoc 권장 미디어 타입
[outputs]
  home = ["HTML", "RSS", "SEARCH", "SITEMAP"]
  page = ["HTML"]
  section = ["HTML", "RSS"]

[outputFormats]
  [outputFormats.SEARCH]
    baseName = "search"
    isPlainText = true
    mediaType = "application/json"
    notAlternative = true
  [outputFormats.SITEMAP]
    baseName = "sitemap"
    isPlainText = true
    mediaType = "application/xml"
    notAlternative = true

[mediaTypes]
  [mediaTypes."application/xml"]
    suffixes = ["xml"]

# Geekdoc 사이트 파라미터
[params]
  # SSOT — Version 갱신은 이 두 줄만 동시에 수정
  version = "0.2.0"
  releaseDate = "2026-05-21"
  geekdocRepo = "https://github.com/modu-ai/moai-adk-go"
  geekdocEditPath = "edit/main/docs-site/content"
  geekdocSearch = true
  geekdocSearchShowParent = true
  geekdocLegalNotice = "https://github.com/modu-ai/moai-adk-go"
  geekdocPrivacyPolicy = "/about/"
  geekdocToC = 3
  geekdocBreadcrumb = true
  geekdocNextPrev = true
  geekdocTagsToMenu = true
  geekdocFileTreeSortBy = "weight"
  geekdocCollapseSection = false
  # 4-locale × 100+ 페이지 자동 사이드바 — content tree weight 기반 자동 생성
  # data/menu/ 수동 정의 대신 각 섹션 _index.md weight + 페이지 frontmatter weight 사용
  geekdocMenuBundle = false
  # Mermaid 다이어그램 활성화 (flowchart, sequence, etc.)
  geekdocMermaid = true

  # 사이트 메타
  description = "MoAI-ADK 온라인 문서 — Claude Code를 위한 에이전틱 개발 도구 키트"
  author = "modu-ai"

  # 라이트 모드 고정
  geekdocDarkModeDefault = false
  geekdocDarkModeToggle = false

  # MoAI 브랜드 에셋
  geekdocImage = "moai-logo.png"
  # og:image 기본값 (1200x630, 페이지 frontmatter의 images 로 오버라이드 가능)
  images = ["og.jpg"]

  [params.geekdocFontAwesome]
    url = "https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/css/all.min.css"

# 4-locale 다국어 설정
[languages]
  [languages.ko]
    contentDir = "content/ko"
    languageName = "한국어"
    languageCode = "ko-KR"
    weight = 1
    title = "MoAI-ADK 문서"
    [languages.ko.params]
      description = "MoAI-ADK 온라인 문서 — Claude Code를 위한 에이전틱 개발 도구 키트"

  [languages.en]
    contentDir = "content/en"
    languageName = "English"
    languageCode = "en-US"
    weight = 2
    title = "MoAI-ADK Documentation"
    [languages.en.params]
      description = "MoAI-ADK online documentation — Agentic Development Kit for Claude Code"

  [languages.ja]
    contentDir = "content/ja"
    languageName = "日本語"
    languageCode = "ja-JP"
    weight = 3
    title = "MoAI-ADK ドキュメント"
    [languages.ja.params]
      description = "MoAI-ADK オンラインドキュメント — Claude Code 向けエージェント型開発キット"

  [languages.zh]
    contentDir = "content/zh"
    languageName = "简体中文"
    languageCode = "zh-CN"
    weight = 4
    title = "MoAI-ADK 文档"
    [languages.zh.params]
      description = "MoAI-ADK 在线文档 — 面向 Claude Code 的智能开发工具包"
