baseURL: "https://adk.mo.ai.kr/"
title: "MoAI-ADK Documentation"
enableGitInfo: true
enableRobotsTXT: true
hasCJKLanguage: true

defaultContentLanguage: ko
defaultContentLanguageInSubdir: true

# Hextra theme via Hugo modules
module:
  imports:
    - path: github.com/imfing/hextra

# Languages (4 locales)
languages:
  ko:
    contentDir: content/ko
    languageName: "한국어"
    languageCode: "ko-KR"
    weight: 1
    title: "MoAI-ADK 문서"
    params:
      description: "MoAI-ADK 온라인 문서 — Claude Code를 위한 에이전틱 개발 도구 키트"
  en:
    contentDir: content/en
    languageName: "English"
    languageCode: "en-US"
    weight: 2
    title: "MoAI-ADK Documentation"
    params:
      description: "MoAI-ADK online documentation — Agentic Development Kit for Claude Code"
  ja:
    contentDir: content/ja
    languageName: "日本語"
    languageCode: "ja-JP"
    weight: 3
    title: "MoAI-ADK ドキュメント"
    params:
      description: "MoAI-ADK オンラインドキュメント — Claude Code 向けエージェント型開発キット"
  zh:
    contentDir: content/zh
    languageName: "简体中文"
    languageCode: "zh-CN"
    weight: 4
    title: "MoAI-ADK 文档"
    params:
      description: "MoAI-ADK 在线文档 — 面向 Claude Code 的智能开发工具包"

# Default markup settings
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

# Default output formats
outputs:
  home: [HTML]
  page: [HTML]
  section: [HTML, RSS]

# Default params (Hextra-specific)
params:
  description: "MoAI-ADK online documentation — Agentic Development Kit for Claude Code"
  navbar:
    displayTitle: true
    displayLogo: true
  footer:
    displayCopyright: true
    displayPoweredBy: false
    copyright: "MIT License © 2025 MoAI-ADK Contributors"
  search:
    enable: false
    type: flexsearch
  editURL:
    enable: true
    base: "https://github.com/modu-ai/moai-adk-go/edit/main/docs-site/content"
