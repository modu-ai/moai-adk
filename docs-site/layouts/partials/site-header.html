<header class="gdoc-header" role="banner">
  <div class="cw-header-inner">
    <a class="gdoc-brand cw-brand" href="/">
      <span class="cw-brand-name">{{ site.Title }}</span>
      <span class="cw-brand-ver">v{{ site.Params.version }}</span>
    </a>
    <div class="cw-nav-search">
      <button type="button" class="cw-search-input" data-search-trigger aria-label="문서 검색 (⌘K)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3" stroke-linecap="round"/></svg>
        <span>문서 검색</span>
        <kbd>⌘K</kbd>
      </button>
    </div>
    <div class="cw-nav-actions">
      {{- /* 언어 선택 — 추후 사용 예정, 현재는 숨김. DOM 보존하여 차후 재활성화 시 CSS 한 줄만 풀면 됨 */ -}}
      <div class="cw-lang-switch" role="tablist" aria-label="언어" hidden style="display:none">
        <button class="active" type="button">KO</button>
        <button type="button">EN</button>
        <button type="button">JA</button>
        <button type="button">ZH</button>
      </div>
      {{- if default true .Site.Params.geekdocDarkModeToggle }}
      <span id="gdoc-color-theme" class="cw-theme-toggle" tabindex="0" role="button" aria-pressed="false" aria-label="다크 모드 전환">
        <svg class="gdoc-icon gdoc_brightness_dark" width="18" height="18"><use xlink:href="#gdoc_brightness_dark"></use></svg>
        <svg class="gdoc-icon gdoc_brightness_light" width="18" height="18"><use xlink:href="#gdoc_brightness_light"></use></svg>
      </span>
      {{- end }}
      <a class="cw-gh-stars" href="https://github.com/modu-ai/moai-adk" target="_blank" rel="noopener noreferrer" aria-label="GitHub 저장소 (modu-ai/moai-adk) 새 창으로 열기">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .3a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.5-1.4-1.3-1.7-1.3-1.7-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1.1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-5.9 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.7 1.7.3 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0 0 12 .3"/></svg>
        <span>Star</span>
        <span class="cw-gh-count" data-gh-stars>—</span>
      </a>
    </div>
  </div>
</header>

{{- /* 검색 모달 ⌘K / Ctrl+K */ -}}
<div class="cw-search-modal" data-search-modal hidden>
  <div class="cw-search-modal__backdrop" data-search-close></div>
  <div class="cw-search-modal__panel" role="dialog" aria-modal="true" aria-label="문서 검색">
    <div class="cw-search-modal__head">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3" stroke-linecap="round"/></svg>
      <input type="search" class="cw-search-modal__input" placeholder="문서·플러그인·스킬 검색..." data-search-input autocomplete="off" />
      <kbd class="cw-search-modal__kbd" data-search-close>ESC</kbd>
    </div>
    <div class="cw-search-modal__body" data-search-results>
      <div class="cw-search-modal__hint">검색어를 입력하세요. 최소 2자 이상.</div>
    </div>
  </div>
</div>

<script>
// GitHub stars 실시간 (24h 캐시)
(function(){
  const el = document.querySelector('[data-gh-stars]'); if (!el) return;
  const KEY = 'cw-gh-stars'; const TTL = 24*60*60*1000;
  const fmt = (n) => n >= 1000 ? (n/1000).toFixed(1).replace(/\.0$/, '') + 'k' : String(n);
  try {
    const c = JSON.parse(localStorage.getItem(KEY) || 'null');
    if (c && Date.now() - c.t < TTL) { el.textContent = fmt(c.n); return; }
  } catch(e) {}
  fetch('https://api.github.com/repos/modu-ai/moai-adk')
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(d => {
      const n = d.stargazers_count;
      el.textContent = fmt(n);
      try { localStorage.setItem(KEY, JSON.stringify({ n, t: Date.now() })); } catch(e) {}
    })
    .catch(() => { el.textContent = ''; });
})();

// 검색 모달 — Geekdoc search.json 활용
(function(){
  const modal = document.querySelector('[data-search-modal]');
  const input = document.querySelector('[data-search-input]');
  const results = document.querySelector('[data-search-results]');
  if (!modal || !input || !results) return;

  let index = null;
  const loadIndex = () => {
    if (index) return Promise.resolve(index);
    return fetch('/search.json').then(r => r.ok ? r.json() : []).then(d => { index = d; return d; }).catch(() => { index = []; return []; });
  };

  const open = () => {
    modal.hidden = false;
    document.body.style.overflow = 'hidden';
    setTimeout(() => input.focus(), 50);
    loadIndex();
  };
  const close = () => {
    modal.hidden = true;
    document.body.style.overflow = '';
    input.value = '';
    results.innerHTML = '<div class="cw-search-modal__hint">검색어를 입력하세요. 최소 2자 이상.</div>';
  };

  // trigger button
  document.querySelectorAll('[data-search-trigger]').forEach(b => b.addEventListener('click', (e) => { e.preventDefault(); open(); }));
  // close handlers
  document.querySelectorAll('[data-search-close]').forEach(b => b.addEventListener('click', close));
  // ESC
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault();
      modal.hidden ? open() : close();
    } else if (e.key === 'Escape' && !modal.hidden) {
      close();
    }
  });

  // search
  const escapeHtml = (s) => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const highlight = (text, q) => {
    const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    return escapeHtml(text).replace(re, '<mark>$1</mark>');
  };
  const render = (q, hits) => {
    if (!hits.length) { results.innerHTML = '<div class="cw-search-modal__hint">검색 결과 없음.</div>'; return; }
    results.innerHTML = '<ul class="cw-search-modal__list">' + hits.slice(0, 30).map(h => `
      <li><a href="${escapeHtml(h.href)}">
        <div class="title">${highlight(h.title || '', q)}</div>
        ${h.parent ? `<div class="parent">${escapeHtml(h.parent)}</div>` : ''}
        ${h.content ? `<div class="excerpt">${highlight((h.content || '').slice(0, 140), q)}…</div>` : ''}
      </a></li>
    `).join('') + '</ul>';
  };
  const search = (q) => {
    if (!index || !q || q.length < 2) {
      results.innerHTML = '<div class="cw-search-modal__hint">검색어를 입력하세요. 최소 2자 이상.</div>';
      return;
    }
    const ql = q.toLowerCase();
    const score = (item) => {
      const t = (item.title || '').toLowerCase();
      const c = (item.content || '').toLowerCase();
      let s = 0;
      if (t.includes(ql)) s += 100;
      if (t.startsWith(ql)) s += 50;
      const cm = c.split(ql).length - 1;
      s += Math.min(cm * 5, 40);
      return s;
    };
    const hits = (index || []).map(it => ({ ...it, _s: score(it) })).filter(it => it._s > 0).sort((a,b) => b._s - a._s);
    render(q, hits);
  };

  let t = null;
  input.addEventListener('input', () => {
    clearTimeout(t);
    t = setTimeout(() => search(input.value.trim()), 80);
  });
})();
</script>
